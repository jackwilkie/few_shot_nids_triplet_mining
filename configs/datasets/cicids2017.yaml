---

# -- name of dataset and location
name: cicids2017
tabular: True
data_path: ~/data/cicids2017.csv

# -- columns to drop to prevent dataleak due to labelling method
drop_cols:
    - proto
    - prt_dst
    - prt_src
    - num_src_flows
    - src_ip_dst_prt_delta
    
    
# -- dataset information
n_features: 26
n_classes: 5
n_numeric: 26
n_cat: 0
n_cats: []

# -- split info
sample_thres: 100  # drop classes with less than this number of samples
train_ratio: 0.5
val_ratio: 0.
test_ratio: 0.5
split_seed: 39058032

# -- misc 
target: label # name of label column
batch_size: ${hyperparameters.batch_size}
balance_train: True
load_on_cpu: False