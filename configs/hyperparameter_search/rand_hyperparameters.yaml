---

mixed_precision: False

# -- weights
weight_init: 0.02

# -- optimiser
optimiser: 
    name: AdamW
    betas:
        - 0.9
        - 0.999
    weight_decay: --:log10_uniform(0.000001, 0.05, 7)

batch_size: --:randpower(5,10,2)
grad_accumulation: 1

# -- learning rate
schedules:
    lr:
        name: cosine
        start_val: --:log10_uniform(0.000001, 0.001, 8)
        end_val: 0.000001
        T_max: ${hyperparameters.training_epochs}
    
    
# -- epochs
training_epochs: 200